<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Les Secrets des Mains</title>
    <script>
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="text/javascript">
      var l = window.location;
      var repo = 'les-secrets-des-mains-c4bb0536';
      var base = 'https://les-caprices-d-oracel.github.io/' + repo;
      var path = l.pathname;
      // If we are not under the repo path, redirect to the correct repo
      if (!path.startsWith('/' + repo) && path !== '/') {
        window.location.replace(base + path);
      }
      // If we are at the root or index, redirect to /lectures
      else if (path === '/' + repo || path === '/' + repo + '/' || path === '/' + repo + '/index.html') {
        window.location.replace(base + '/lectures');
      }
      // Otherwise, we are on a valid subpath - just let the app load normally
      // The 404.html is served by GitHub Pages for subpaths that don't exist as files,
      // but the SPA router handles them. No redirect needed.
    </script>
  </head>
  <body>Redirecting...</body>
</html>
