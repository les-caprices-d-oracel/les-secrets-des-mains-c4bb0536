<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Les Secrets des Mains</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="text/javascript">
      var l = window.location;
      var repo = 'les-secrets-des-mains-c4bb0536';
      var base = 'https://les-caprices-d-oracel.github.io/' + repo;
      var path = l.pathname;
      if (!path.startsWith('/' + repo)) {
        window.location.replace(base + path);
      } else {
        var pagePath = path.replace('/' + repo, '');
        if (pagePath === '' || pagePath === '/' || pagePath === '/index.html') {
          window.location.replace(base + '/lectures');
        }
      }
    </script>
  </head>
  <body>Redirecting...</body>
</html>
