    <script>
      (function(){
        var q = window.location.search.slice(1).split('&').filter(Boolean);
        var p = q.find(function(s){ return s.startsWith('p='); });
        if(p){
          window.history.replaceState(null,null,
            decodeURIComponent(p.slice(2)) +
            (q.filter(function(s){return !s.startsWith('p=');}).join('&') ? '?'+q.filter(function(s){return !s.startsWith('p=');}).join('&') : '')
          );
        }
      })();
